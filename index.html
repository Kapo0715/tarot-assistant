<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黒烏タロット｜鑑定アシスタント</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --text: #f0f0f0;
      --muted: #777;
      --accent: #7c3aed;
      --accent-h: #6d28d9;
      --accent-l: #a78bfa;
      --border: #2e2e2e;
      --danger: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding: 16px 16px 48px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .header-title { text-align: center; flex: 1; }
    header h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.2rem;
      color: var(--accent-l);
      letter-spacing: 0.08em;
    }
    header p {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 5px;
    }
    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      width: 38px;
      height: 38px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .settings-btn:hover { border-color: var(--accent-l); color: var(--accent-l); }
    .settings-btn.has-key { border-color: var(--accent); color: var(--accent-l); }
    .header-spacer { width: 38px; flex-shrink: 0; }

    /* ── Sections ── */
    section { margin-bottom: 28px; }
    .label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      min-height: 96px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── Card Grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .card-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card-item:active { transform: scale(0.96); }
    .card-item.selected { background: var(--accent); border-color: var(--accent); }
    .card-num { font-size: 0.6rem; color: var(--muted); display: block; margin-bottom: 3px; }
    .card-item.selected .card-num { color: rgba(255,255,255,0.6); }
    .card-name { font-family: 'Noto Serif JP', serif; font-size: 0.82rem; display: block; }

    /* ── Position Toggle ── */
    .position-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pos-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pos-btn.selected { background: var(--accent); border-color: var(--accent); }

    /* ── Mode Toggle ── */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .mode-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.82rem;
      padding: 10px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn.selected { background: var(--surface); border-color: var(--accent-l); color: var(--accent-l); }
    .mode-btn .badge {
      display: inline-block;
      font-size: 0.6rem;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ── Generate Button ── */
    .generate-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 16px;
      min-height: 54px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.04em;
    }
    .generate-btn:hover { background: var(--accent-h); }
    .generate-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
    .generate-btn.loading { background: var(--accent-h); cursor: wait; }

    /* ── No-key Warning ── */
    .no-key-warn {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      display: none;
    }
    .no-key-warn a { color: var(--accent-l); cursor: pointer; text-decoration: underline; }

    /* ── Output ── */
    .output-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px 16px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .output-area.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-badge {
      font-size: 0.65rem;
      color: var(--accent-l);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .output-badge::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .output-mode-tag {
      font-size: 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--muted);
      margin-left: 4px;
    }

    .output-text {
      font-size: 0.95rem;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 18px;
    }

    .output-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .copy-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      padding: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: var(--accent-h); }
    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      padding: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: var(--muted); color: var(--text); }

    .copy-msg {
      text-align: center;
      font-size: 0.78rem;
      color: var(--accent-l);
      min-height: 22px;
      margin-top: 10px;
      transition: opacity 0.3s;
    }
    .copy-msg.hidden { opacity: 0; }

    /* ── Upsell Section ── */
    .upsell-section {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      margin: 16px 0 8px;
    }
    .upsell-text {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .upsell-btn {
      display: block;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent-l);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem;
      padding: 11px;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .upsell-btn:hover { background: rgba(124,58,237,0.15); }

    /* ── Settings Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 560px;
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-family: 'Noto Serif JP', serif; font-size: 1rem; color: var(--accent-l); }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    .modal-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.06em; }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.88rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 8px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--muted); }
    .modal-hint { font-size: 0.7rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal-hint a { color: var(--accent-l); }

    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .modal-save {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      padding: 13px;
      cursor: pointer;
    }
    .modal-clear {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      padding: 13px;
      cursor: pointer;
    }

    .api-status {
      font-size: 0.72rem;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
    .api-status.ok { color: #4ade80; }
    .api-status.err { color: var(--danger); }

    .version-tag {
      font-size: 0.62rem;
      color: var(--muted);
      margin-left: 6px;
      flex-shrink: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <div class="header-spacer"></div>
  <div class="header-title">
    <h1>黒烏タロット｜鑑定アシスタント</h1>
    <p>無料鑑定（1枚引き）返信文ジェネレーター</p>
  </div>
  <button class="settings-btn" id="settings-btn" onclick="openSettings()" title="API設定">⚙</button>
  <span class="version-tag" id="version-tag"></span>
</header>

<section>
  <div class="label">① 相談者の質問</div>
  <textarea id="question" placeholder="受け取った質問をここに貼り付けてください"></textarea>
</section>

<section>
  <div class="label">② カードを選択</div>
  <div class="card-grid" id="card-grid"></div>
</section>

<section>
  <div class="label">③ 正位置 / 逆位置</div>
  <div class="position-toggle">
    <button class="pos-btn selected" id="btn-upright" onclick="setPosition('upright')">正位置</button>
    <button class="pos-btn" id="btn-reversed" onclick="setPosition('reversed')">逆位置</button>
  </div>
</section>

<section>
  <div class="label">④ モード</div>
  <div class="mode-toggle">
    <button class="mode-btn selected" id="mode-template" onclick="setMode('template')">テンプレート</button>
    <button class="mode-btn" id="mode-ai" onclick="setMode('ai')">AI生成 <span class="badge">Gemini</span></button>
  </div>
  <button class="generate-btn" id="generate-btn" onclick="generate()" disabled>返信文を作る</button>
  <p class="no-key-warn" id="no-key-warn">APIキーが未設定です。<a onclick="openSettings()">こちらから設定</a>してください。</p>
</section>

<div class="output-area" id="output-area">
  <div class="output-badge">返信文 <span class="output-mode-tag" id="output-mode-tag"></span></div>
  <div class="output-text" id="output-text"></div>
  <div class="upsell-section" id="upsell-section" style="display:none">
    <p class="upsell-text" id="upsell-text"></p>
    <a class="upsell-btn" id="upsell-btn" href="#" target="_blank"></a>
  </div>
  <div class="output-actions">
    <button class="copy-btn" onclick="copyText()">返信文のみ</button>
    <button class="copy-btn" onclick="copyAll()">全部コピー</button>
  </div>
  <button class="reset-btn" style="width:100%;margin-top:8px" onclick="resetOutput()">作り直す</button>
  <div class="copy-msg hidden" id="copy-msg">コピーしました</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">API設定</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-label">Gemini APIキー</div>
    <input class="modal-input" type="password" id="api-key-input" placeholder="AIza..." autocomplete="off">
    <p class="modal-hint">
      端末のブラウザにのみ保存されます。サーバーには送信されません。<br>
      APIキーは <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> で無料取得できます。
    </p>
    <div class="modal-actions">
      <button class="modal-save" onclick="saveApiKey()">保存</button>
      <button class="modal-clear" onclick="clearApiKey()">削除</button>
    </div>
    <div class="api-status" id="api-status"></div>
  </div>
</div>

<script src="config.js"></script>

// ── State ──
let selectedCard = null;
let position = 'upright';
let mode = 'template';

// ── Init ──
function renderCards() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = CARDS.map(card => `
    <div class="card-item" id="card-${card.id}" onclick="selectCard(${card.id})">
      <span class="card-num">${card.id}</span>
      <span class="card-name">${card.name}</span>
    </div>
  `).join('');
}

function selectCard(id) {
  if (selectedCard !== null) document.getElementById(`card-${selectedCard}`).classList.remove('selected');
  selectedCard = id;
  document.getElementById(`card-${id}`).classList.add('selected');
  document.getElementById(`card-${id}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  updateGenerateBtn();
}

function setPosition(pos) {
  position = pos;
  document.getElementById('btn-upright').classList.toggle('selected', pos === 'upright');
  document.getElementById('btn-reversed').classList.toggle('selected', pos === 'reversed');
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-template').classList.toggle('selected', m === 'template');
  document.getElementById('mode-ai').classList.toggle('selected', m === 'ai');
  updateGenerateBtn();
  const warn = document.getElementById('no-key-warn');
  warn.style.display = (m === 'ai' && !getApiKey()) ? 'block' : 'none';
}

function updateGenerateBtn() {
  const btn = document.getElementById('generate-btn');
  btn.disabled = selectedCard === null;
}

// ── Generate ──
async function generate() {
  if (selectedCard === null) return;
  if (mode === 'ai') {
    await generateAI();
  } else {
    generateTemplate();
  }
}

function generateTemplate() {
  const card = CARDS[selectedCard];
  const text = card[position].reply;
  showOutput(text, 'テンプレート');
}

async function generateAI() {
  const apiKey = getApiKey();
  if (!apiKey) {
    openSettings();
    return;
  }

  const card = CARDS[selectedCard];
  const question = document.getElementById('question').value.trim();
  const posLabel = position === 'upright' ? '正位置' : '逆位置';
  const meaning = card[position].meaning;

  const userMessage = `あなたは「黒烏タロット」という転職専門の占い師です。
口調: 丁寧だが率直、辛口リアル系。一文は短く（体言止め可）、絵文字は使わない。

以下の情報をもとに、LINEへの返信文（本文のみ）を書いてください。締めの言葉は不要です。

【相談者の質問】
${question || '（質問未入力）'}

【引いたカード】
${card.name}（${posLabel}）

【カードの基本解釈（転職文脈）】
${meaning}

【必須構成】番号や見出しは出力せず、以下の3つの内容を自然な文章でつなげて書くこと：

【現状】カードが示す今の状態を具体的に描写する
・抽象的な解釈で終わらせない
・「どういう行動・感情の状態にいるか」を具体的に描写する
・読んだ人が「私のことを見ている」と感じるくらい具体的に

【核心】相談内容に対して逃げずに答える
・「〜かもしれない」は使わず断言する
・今すべきこと／やめるべきことを1つに絞って伝える
・辛口でも、相手のためになる言葉を選ぶ

【余白】希望を示しつつ、道筋だけを残して締める
・相談者には可能性・素地があることを肯定的に伝える
・ただし「そこに至る具体的な道筋は今回の鑑定では見えない」と正直に添える
・感情的な言葉は使わず、前向きかつ静かなトーンで締める
・1〜2文で完結させる`;

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '生成中...';

  try {
    const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: userMessage }] }],
        generationConfig: { maxOutputTokens: 1024, temperature: 0.7 },
        safetySettings: [
          { category: 'HARM_CATEGORY_HARASSMENT',        threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HATE_SPEECH',       threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
        ]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const parts = data.candidates?.[0]?.content?.parts || [];
    const body = parts.map(p => p.text || '').join('');
    const text = body.trim() + '\n\n' + CONFIG.CLOSING_TEXT;
    showOutput(text, 'AI生成');
  } catch (e) {
    alert(`エラーが発生しました:\n${e.message}`);
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '返信文を作る';
  }
}

function showOutput(text, modeLabel) {
  const question = document.getElementById('question').value.trim() || '（未入力）';
  const card = CARDS[selectedCard];
  const posLabel = position === 'upright' ? '正位置' : '逆位置';
  const header = `■ご相談\n${question}\n\n■カード\n${card.name}（${posLabel}）\n\n■カードの意味\n`;
  document.getElementById('output-text').textContent = header + text;
  document.getElementById('output-mode-tag').textContent = modeLabel;

  if (selectedCard !== null) {
    const card = CARDS[selectedCard];
    const upsell = CONFIG.UPSELL[card.category] || CONFIG.UPSELL['その他'];
    const url = upsell.plan === 'matsu' ? CONFIG.BASE_URL_MATSU : CONFIG.BASE_URL_UME;
    const btnLabel = upsell.plan === 'matsu' ? '松プラン を見る →' : '梅プラン ¥3,000 を見る →';
    document.getElementById('upsell-text').textContent = upsell.text;
    document.getElementById('upsell-btn').href = url;
    document.getElementById('upsell-btn').textContent = btnLabel;
    document.getElementById('upsell-section').style.display = 'block';
  }

  const area = document.getElementById('output-area');
  area.classList.add('visible');
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('copy-msg').classList.add('hidden');
}

// ── Copy / Reset ──
function showCopyMsg(msg) {
  const el = document.getElementById('copy-msg');
  el.textContent = msg || 'コピーしました';
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 2000);
}

function copyText() {
  const text = document.getElementById('output-text').textContent;
  navigator.clipboard.writeText(text).then(() => showCopyMsg('返信文をコピーしました'));
}

function copyAll() {
  const reply = document.getElementById('output-text').textContent;
  const upsellSection = document.getElementById('upsell-section');
  let text = reply;
  if (upsellSection.style.display !== 'none') {
    const upsellText = document.getElementById('upsell-text').textContent;
    const upsellBtn = document.getElementById('upsell-btn');
    text += '\n\n─────────────\n' + upsellText + '\n▶ ' + upsellBtn.textContent + '\n   ' + upsellBtn.href + '\n─────────────';
  }
  navigator.clipboard.writeText(text).then(() => showCopyMsg('全部コピーしました'));
}

function resetOutput() {
  document.getElementById('output-area').classList.remove('visible');
  document.getElementById('upsell-section').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Settings ──
function getApiKey() { return localStorage.getItem('kurokara_gemini_key') || ''; }

function openSettings() {
  document.getElementById('api-key-input').value = getApiKey();
  document.getElementById('api-status').textContent = '';
  document.getElementById('api-status').className = 'api-status';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { clearApiKey(); return; }
  localStorage.setItem('kurokara_gemini_key', key);
  document.getElementById('settings-btn').classList.add('has-key');
  const st = document.getElementById('api-status');
  st.textContent = '保存しました';
  st.className = 'api-status ok';
  document.getElementById('no-key-warn').style.display = 'none';
  setTimeout(closeSettings, 800);
}

function clearApiKey() {
  localStorage.removeItem('kurokara_gemini_key');
  document.getElementById('api-key-input').value = '';
  document.getElementById('settings-btn').classList.remove('has-key');
  const st = document.getElementById('api-status');
  st.textContent = 'APIキーを削除しました';
  st.className = 'api-status err';
}

// ── Boot ──
renderCards();
if (getApiKey()) document.getElementById('settings-btn').classList.add('has-key');
document.getElementById('version-tag').textContent = `v${CONFIG.VERSION}`;
</script>
</body>
</html>
